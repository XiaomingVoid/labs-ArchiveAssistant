name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ] # 当推送到主分支时触发
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许在 GitHub 页面上手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库源代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 JDK 环境（根据 README 要求使用 JDK 11）
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    # 3. 赋予 Gradle 脚本执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. 执行 Gradle 构建命令生成 APK
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 5. 将生成的 APK 文件作为构建产物上传，方便在 GitHub 页面下载
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: archive-assistant-debug-apk
        path: app/build/outputs/apk/debug/*.apk
