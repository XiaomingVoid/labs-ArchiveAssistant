name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库源代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 JDK 17 环境（修复 Java 11 导致的 Spotless 插件报错）
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle # 开启依赖缓存，避免每次都重新下载整个 Gradle 环境和依赖包

    # 3. 赋予 Gradle 脚本执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. 运行代码格式检查（可选）
    # 如果你在项目中配置了 spotless，建议在构建前验证，或者直接通过下一阶段构建
    # - name: Run Spotless Check
    #   run: ./gradlew spotlessCheck

    # 5. 执行 Gradle 构建命令生成测试版 APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 6. 将生成的 APK 文件作为构建产物上传到 GitHub 页面供下载
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: JuHeShiYi-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7 # 产物保留7天，节约你的 GitHub 存储空间
